name: Build

on:
  workflow_dispatch: # 允许在 Actions 页面手动触发

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os_name: linux-amd64
          - goos: windows
            goarch: amd64
            os_name: windows-amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            os_name: macos-amd64
          - goos: darwin
            goarch: arm64
            os_name: macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o mse-${{ matrix.os_name }}${{ matrix.ext }} main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mse-${{ matrix.os_name }}
          path: mse-${{ matrix.os_name }}${{ matrix.ext }}
